name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/dependabot.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/dependabot.yml'

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ============================================================================
  # Backend Tests
  # ============================================================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "src/api/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/api/requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: python -m pytest tests/ -v --cov=src/api --cov-report=xml --cov-report=term-missing --cov-fail-under=92
        env:
          PYTHONPATH: src

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: github.event_name == 'push'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ============================================================================
  # Backend Lint
  # ============================================================================
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/api/

      - name: Run ruff format check
        run: ruff format --check src/api/

  # ============================================================================
  # Mobile TypeScript Check
  # ============================================================================
  mobile-typecheck:
    name: Mobile TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "src/mobile/package-lock.json"

      - name: Install dependencies
        run: |
          cd src/mobile
          npm ci

      - name: TypeScript check
        run: |
          cd src/mobile
          npx tsc --noEmit

  # ============================================================================
  # Web Lint & Build
  # ============================================================================
  web-lint:
    name: Web Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "src/web/package-lock.json"

      - name: Install dependencies
        run: npm ci
        working-directory: src/web

      - name: Lint
        run: npm run lint
        working-directory: src/web

  web-build:
    name: Web Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "src/web/package-lock.json"

      - name: Install dependencies
        run: npm ci
        working-directory: src/web

      - name: Build
        run: npm run build
        working-directory: src/web

  # ============================================================================
  # Docker Build (API)
  # ============================================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: benchgoblins-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Deploy to Fly.io
  # ============================================================================
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [backend-test, backend-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
