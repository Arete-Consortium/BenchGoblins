[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning:httpx:
    ignore::DeprecationWarning:httpcore:
    ignore::DeprecationWarning:pydantic:
    ignore::DeprecationWarning:sqlalchemy:
