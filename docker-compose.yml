version: "3.8"

services:
  api:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgresql://benchgoblins:${POSTGRES_PASSWORD:-benchgoblins}@postgres:5432/benchgoblins
      - REDIS_URL=${REDIS_URL:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    env_file:
      - .env
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - benchgoblins-net

  postgres:
    image: postgres:16-alpine
    container_name: benchgoblins-db
    environment:
      POSTGRES_USER: benchgoblins
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-benchgoblins}
      POSTGRES_DB: benchgoblins
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benchgoblins -d benchgoblins"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - benchgoblins-net

  db-init:
    image: postgres:16-alpine
    container_name: benchgoblins-db-init
    environment:
      PGHOST: postgres
      PGUSER: benchgoblins
      PGPASSWORD: ${POSTGRES_PASSWORD:-benchgoblins}
      PGDATABASE: benchgoblins
    volumes:
      - ./data/schema.sql:/schema.sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["sh", "-c", "psql -f /schema.sql"]
    networks:
      - benchgoblins-net

  redis:
    image: redis:7-alpine
    container_name: benchgoblins-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - benchgoblins-net

  # Database backup service - runs daily at 3 AM
  backup:
    image: postgres:16-alpine
    container_name: benchgoblins-backup
    environment:
      PGHOST: postgres
      PGUSER: benchgoblins
      PGPASSWORD: ${POSTGRES_PASSWORD:-benchgoblins}
      PGDATABASE: benchgoblins
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./backups:/backups
      - ./scripts:/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
    # Run backup immediately on start, then can be triggered manually
    # For scheduled backups, use cron on host or GitHub Actions
    entrypoint: ["sh", "-c", "pg_dump --no-owner --no-acl --clean --if-exists | gzip > /backups/benchgoblins_backup_$$(date +%Y%m%d_%H%M%S).sql.gz && echo 'Backup completed' && find /backups -name 'benchgoblins_backup_*.sql.gz' -mtime +$${BACKUP_RETENTION_DAYS} -delete"]
    profiles:
      - backup
    networks:
      - benchgoblins-net

volumes:
  postgres_data:
  redis_data:

networks:
  benchgoblins-net:
    driver: bridge
